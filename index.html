<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ AI塔罗占卜 - Powered by Pollinations</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Serif SC', serif;
            background: #0a0a1a;
            min-height: 100vh;
            color: #e0d5c1;
            overflow-x: hidden;
        }

        /* 星空背景 */
        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* 标题 */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 3em;
            background: linear-gradient(135deg, #ffd700, #ff6b9d, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .header p {
            color: #8b7ec8;
            font-size: 1.1em;
        }

        /* 输入区域 */
        .question-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        .question-box label {
            display: block;
            margin-bottom: 12px;
            font-size: 1.1em;
            color: #c084fc;
        }
        textarea {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(192,132,252,0.3);
            border-radius: 12px;
            color: #e0d5c1;
            font-family: 'Noto Serif SC', serif;
            font-size: 16px;
            resize: vertical;
            min-height: 80px;
            outline: none;
            transition: border-color 0.3s;
        }
        textarea:focus {
            border-color: #c084fc;
        }
        textarea::placeholder {
            color: #6b6b8d;
        }

        /* 牌阵选择 */
        .spread-select {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .spread-option {
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(192,132,252,0.3);
            border-radius: 25px;
            color: #c084fc;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Noto Serif SC', serif;
        }
        .spread-option:hover, .spread-option.active {
            background: rgba(192,132,252,0.2);
            border-color: #c084fc;
        }

        /* 抽牌按钮 */
        .draw-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea, #764ba2, #c084fc);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.2em;
            font-family: 'Noto Serif SC', serif;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
            position: relative;
            overflow: hidden;
        }
        .draw-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(118,75,162,0.4);
        }
        .draw-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 塔罗牌展示 */
        .cards-display {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 40px 0;
            flex-wrap: wrap;
            min-height: 50px;
        }
        .tarot-card {
            width: 160px;
            height: 280px;
            border-radius: 15px;
            position: relative;
            cursor: pointer;
            perspective: 1000px;
            transition: transform 0.3s;
        }
        .tarot-card:hover {
            transform: translateY(-15px);
        }
        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s;
        }
        .tarot-card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 15px;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .card-back {
            background: linear-gradient(135deg, #1a1a3e, #2d1b69);
            border: 2px solid #c084fc;
            box-shadow: 0 0 20px rgba(192,132,252,0.3);
        }
        .card-back-pattern {
            font-size: 60px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        .card-front {
            background: linear-gradient(135deg, #1a1235, #2a1f4e);
            border: 2px solid #ffd700;
            transform: rotateY(180deg);
            padding: 15px;
            text-align: center;
            overflow: hidden;
        }
        .card-front img {
            width: 100%;
            height: 70%;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .card-name {
            font-size: 1em;
            color: #ffd700;
            font-weight: bold;
        }
        .card-position {
            font-size: 0.8em;
            color: #8b7ec8;
            margin-top: 5px;
        }
        .card-reversed {
            color: #ff6b9d;
            font-size: 0.75em;
        }

        /* 解读区域 */
        .reading-section {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            backdrop-filter: blur(10px);
            display: none;
        }
        .reading-section.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reading-section h2 {
            color: #ffd700;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.5em;
        }
        .reading-text {
            line-height: 2;
            font-size: 1.05em;
            white-space: pre-wrap;
        }

        /* Loading */
        .loading-overlay {
            text-align: center;
            padding: 40px;
            display: none;
        }
        .loading-overlay.show { display: block; }
        .crystal-ball {
            font-size: 60px;
            animation: float 2s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .loading-text {
            margin-top: 15px;
            color: #c084fc;
            font-size: 1.1em;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: #4a4a6a;
            font-size: 0.9em;
        }
        .footer a {
            color: #8b7ec8;
            text-decoration: none;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .header h1 { font-size: 2em; }
            .tarot-card { width: 120px; height: 210px; }
            .cards-display { gap: 15px; }
            .container { padding: 15px 10px; }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container">
        <div class="header">
            <h1>🔮 AI塔罗占卜</h1>
            <p>让宇宙的智慧为你指引方向</p>
        </div>

        <div class="question-box">
            <label>🌙 请输入你想探寻的问题：</label>
            <textarea id="question" placeholder="例如：我最近的感情运势如何？事业上应该做怎样的选择？"></textarea>

            <label style="margin-top:20px;">🎴 选择牌阵：</label>
            <div class="spread-select">
                <div class="spread-option active" data-spread="3" onclick="selectSpread(this)">三牌阵（过去·现在·未来）</div>
                <div class="spread-option" data-spread="1" onclick="selectSpread(this)">单牌（每日指引）</div>
                <div class="spread-option" data-spread="5" onclick="selectSpread(this)">五牌阵（深度解析）</div>
            </div>

            <button class="draw-btn" id="drawBtn" onclick="startReading()">
                ✨ 开始占卜
            </button>
        </div>

        <div class="cards-display" id="cardsDisplay"></div>

        <div class="loading-overlay" id="loading">
            <div class="crystal-ball">🔮</div>
            <div class="loading-text">水晶球正在感应宇宙能量...</div>
        </div>

        <div class="reading-section" id="reading">
            <h2>✨ 占卜解读</h2>
            <div class="reading-text" id="readingText"></div>
        </div>

        <div class="footer">
            <p>Powered by <a href="https://pollinations.ai" target="_blank">Pollinations AI</a> 🌸</p>
            <p style="margin-top:8px;">塔罗占卜仅供娱乐参考，请理性看待</p>
        </div>
    </div>

    <script>
        // ============ 星空背景 ============
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3;
                star.style.cssText = `
                    width: ${size}px; height: ${size}px;
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    --duration: ${2 + Math.random() * 4}s;
                    animation-delay: ${Math.random() * 3}s;
                `;
                container.appendChild(star);
            }
        }
        createStars();

        // ============ 塔罗牌数据（22张大阿尔卡纳） ============
        const majorArcana = [
            { id: 0,  name: "愚者",     en: "The Fool",          keywords: "新的开始、冒险、自由、天真" },
            { id: 1,  name: "魔术师",   en: "The Magician",      keywords: "创造力、意志力、技能、自信" },
            { id: 2,  name: "女祭司",   en: "The High Priestess",keywords: "直觉、神秘、内在智慧、潜意识" },
            { id: 3,  name: "皇后",     en: "The Empress",       keywords: "丰饶、母性、自然、滋养" },
            { id: 4,  name: "皇帝",     en: "The Emperor",       keywords: "权威、结构、稳定、领导" },
            { id: 5,  name: "教皇",     en: "The Hierophant",    keywords: "传统、信仰、指导、教育" },
            { id: 6,  name: "恋人",     en: "The Lovers",        keywords: "爱情、选择、和谐、关系" },
            { id: 7,  name: "战车",     en: "The Chariot",       keywords: "胜利、决心、意志力、前进" },
            { id: 8,  name: "力量",     en: "Strength",          keywords: "勇气、耐心、内在力量、慈悲" },
            { id: 9,  name: "隐者",     en: "The Hermit",        keywords: "内省、独处、寻找真理、智慧" },
            { id: 10, name: "命运之轮", en: "Wheel of Fortune",  keywords: "转变、机遇、命运、循环" },
            { id: 11, name: "正义",     en: "Justice",           keywords: "公正、真理、因果、平衡" },
            { id: 12, name: "倒吊人",   en: "The Hanged Man",    keywords: "牺牲、等待、新视角、放下" },
            { id: 13, name: "死神",     en: "Death",             keywords: "结束、转变、重生、蜕变" },
            { id: 14, name: "节制",     en: "Temperance",        keywords: "平衡、耐心、调和、中庸" },
            { id: 15, name: "恶魔",     en: "The Devil",         keywords: "束缚、欲望、执着、诱惑" },
            { id: 16, name: "高塔",     en: "The Tower",         keywords: "突变、破坏、觉醒、解放" },
            { id: 17, name: "星星",     en: "The Star",          keywords: "希望、灵感、宁静、信心" },
            { id: 18, name: "月亮",     en: "The Moon",          keywords: "幻觉、不安、直觉、梦境" },
            { id: 19, name: "太阳",     en: "The Sun",           keywords: "快乐、成功、活力、光明" },
            { id: 20, name: "审判",     en: "Judgement",         keywords: "觉醒、重生、反思、召唤" },
            { id: 21, name: "世界",     en: "The World",         keywords: "完成、圆满、成就、旅程终点" }
        ];

        const positionNames = {
            1: ["指引"],
            3: ["过去", "现在", "未来"],
            5: ["当前处境", "挑战", "过去基础", "近期未来", "最终结果"]
        };

        let selectedSpread = 3;
        let drawnCards = [];

        function selectSpread(el) {
            document.querySelectorAll('.spread-option').forEach(e => e.classList.remove('active'));
            el.classList.add('active');
            selectedSpread = parseInt(el.dataset.spread);
        }

        // ============ 抽牌 ============
        function drawRandomCards(count) {
            const shuffled = [...majorArcana].sort(() => Math.random() - 0.5);
            return shuffled.slice(0, count).map(card => ({
                ...card,
                reversed: Math.random() > 0.7  // 30%概率逆位
            }));
        }

        // ============ 生成牌面图像 ============
        function getCardImageUrl(card) {
            const prompt = encodeURIComponent(
                `Tarot card illustration, ${card.en}, mystical, golden border, celestial, detailed art, dark purple background, ornate, magical`
            );
            return `https://image.pollinations.ai/prompt/${prompt}?width=320&height=480&seed=${card.id}&nologo=true`;
        }

        // ============ 开始占卜 ============
        async function startReading() {
            const question = document.getElementById('question').value.trim();
            if (!question) {
                alert('请先输入你想占卜的问题哦 🌙');
                return;
            }

            const btn = document.getElementById('drawBtn');
            btn.disabled = true;
            btn.textContent = '🌟 正在连接宇宙能量...';

            drawnCards = drawRandomCards(selectedSpread);
            const positions = positionNames[selectedSpread];

            // 显示卡牌
            const display = document.getElementById('cardsDisplay');
            display.innerHTML = '';

            drawnCards.forEach((card, i) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'tarot-card';
                cardEl.innerHTML = `
                    <div class="card-inner">
                        <div class="card-back">
                            <div class="card-back-pattern">🌙</div>
                        </div>
                        <div class="card-front">
                            <img src="${getCardImageUrl(card)}" alt="${card.name}" 
                                 onerror="this.style.display='none'">
                            <div class="card-name">${card.name}</div>
                            <div class="card-position">${positions[i]}</div>
                            ${card.reversed ? '<div class="card-reversed">（逆位）</div>' : ''}
                        </div>
                    </div>
                `;
                display.appendChild(cardEl);

                // 依次翻牌
                setTimeout(() => {
                    cardEl.classList.add('flipped');
                }, (i + 1) * 600);
            });

            // 等翻牌完成
            await new Promise(r => setTimeout(r, drawnCards.length * 600 + 800));

            // 开始AI解读
            document.getElementById('loading').classList.add('show');
            document.getElementById('reading').classList.remove('show');

            const cardsDescription = drawnCards.map((card, i) => {
                return `第${i + 1}张牌 - 位置"${positions[i]}"：${card.name}（${card.en}）${card.reversed ? '【逆位】' : '【正位】'}，关键词：${card.keywords}`;
            }).join('\n');

            const prompt = `你是一位拥有多年经验的神秘塔罗牌占卜大师，精通韦特塔罗牌的每一张牌的深层含义。你的解读风格温暖而神秘，富有诗意但不失精准。

用户的问题是：「${question}」

使用的牌阵：${selectedSpread === 1 ? '单牌阵（每日指引）' : selectedSpread === 3 ? '时间之流三牌阵（过去·现在·未来）' : '五牌阵（深度解析）'}

抽到的塔罗牌：
${cardsDescription}

请给出详细的占卜解读，包括：

🌙 每张牌的详细解读（结合牌的位置和正逆位）
🔮 牌阵整体解读（所有牌之间的关联和故事线）
✨ 针对用户问题的核心指引
💫 行动建议

请用富有诗意但清晰的语言，给出有深度、有温度的解读。适当使用emoji来增加氛围感。字数400-800字。`;

            try {
                const response = await fetch('https://text.pollinations.ai/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [
                            { role: 'system', content: '你是一位专业的塔罗牌占卜大师，用中文回答。' },
                            { role: 'user', content: prompt }
                        ],
                        model: 'openai',
                        stream: false
                    })
                });

                const text = await response.text();

                document.getElementById('loading').classList.remove('show');
                document.getElementById('reading').classList.add('show');
                
                // 打字机效果
                const readingEl = document.getElementById('readingText');
                readingEl.textContent = '';
                
                for (let i = 0; i < text.length; i++) {
                    await new Promise(r => setTimeout(r, 20));
                    readingEl.textContent += text[i];
                }

            } catch (error) {
                console.error(error);
                document.getElementById('loading').classList.remove('show');
                document.getElementById('reading').classList.add('show');
                document.getElementById('readingText').textContent = '🌙 宇宙能量暂时受到干扰，请稍后再试...\n\n' + error.message;
            }

            btn.disabled = false;
            btn.textContent = '🔄 重新占卜';
        }
    </script>
</body>
</html>
